<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #0f0f1a;
    font-family: 'Segoe UI', sans-serif;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }
  .bg-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    opacity: 0.3;
  }
  .blob1 { width: 300px; height: 300px; background: #7c3aed; top: -50px; left: -50px; }
  .blob2 { width: 200px; height: 200px; background: #06b6d4; bottom: 0; right: 0; }
  .blob3 { width: 150px; height: 150px; background: #ec4899; top: 50%; left: 50%; transform: translate(-50%,-50%); }
  .glass {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    border-radius: 16px;
    transition: all 0.3s ease;
  }
  .glass:hover { background: rgba(255,255,255,0.08); transform: translateY(-2px); box-shadow: 0 16px 40px rgba(0,0,0,0.4); }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 12px; position: relative; z-index: 1; }
  .card { padding: 16px; }
  .card-icon { font-size: 24px; margin-bottom: 10px; }
  .card-title { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.9); margin-bottom: 4px; }
  .card-sub { font-size: 11px; color: rgba(255,255,255,0.4); }
  .card-val { font-size: 20px; font-weight: 700; color: #fff; margin-top: 8px; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; letter-spacing: 1px; }
  .badge.purple { background: rgba(124,58,237,0.3); color: #a78bfa; border: 1px solid rgba(124,58,237,0.4); }
  .badge.cyan { background: rgba(6,182,212,0.3); color: #67e8f9; border: 1px solid rgba(6,182,212,0.4); }
  .badge.pink { background: rgba(236,72,153,0.3); color: #f9a8d4; border: 1px solid rgba(236,72,153,0.4); }
  .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; position: relative; z-index: 1; }
  .glass-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 10px 14px; color: #fff; font-size: 12px; outline: none; }
  .glass-input:focus { border-color: rgba(124,58,237,0.6); background: rgba(255,255,255,0.08); }
  .glass-input::placeholder { color: rgba(255,255,255,0.25); }
  .btn-row { display: flex; gap: 10px; position: relative; z-index: 1; }
  .btn { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.3s; }
  .btn-primary { background: rgba(124,58,237,0.8); color: #fff; border: 1px solid rgba(124,58,237,0.6); }
  .btn-primary:hover { background: #7c3aed; box-shadow: 0 0 20px rgba(124,58,237,0.5); }
  .btn-ghost { background: transparent; color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.1); }
  .btn-ghost:hover { background: rgba(255,255,255,0.05); color: #fff; }
</style>
</head>
<body>
<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>
<div class="grid">
  <div class="glass card"><div class="card-icon">⚡</div><div class="badge purple">PERFORMANCE</div><div class="card-val">98.4%</div><div class="card-sub">Uptime último mês</div></div>
  <div class="glass card"><div class="card-icon">💎</div><div class="badge cyan">RECEITA</div><div class="card-val">R$ 2.1M</div><div class="card-sub">Meta: R$ 1.8M</div></div>
  <div class="glass card"><div class="card-icon">🚗</div><div class="badge pink">SINISTROS</div><div class="card-val">342</div><div class="card-sub">↓ 18% vs mês ant.</div></div>
</div>
<div class="input-row">
  <div class="glass" style="padding:16px">
    <div style="font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:8px;letter-spacing:1px;text-transform:uppercase">Buscar Associado</div>
    <input class="glass-input" placeholder="Nome, CPF ou placa..." />
  </div>
  <div class="glass" style="padding:16px">
    <div style="font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:8px;letter-spacing:1px;text-transform:uppercase">Período</div>
    <input class="glass-input" type="date" />
  </div>
</div>
<div class="btn-row">
  <button class="btn btn-primary">● Aplicar Filtros</button>
  <button class="btn btn-ghost">Limpar</button>
  <div class="glass" style="padding:10px 16px;font-size:11px;color:rgba(255,255,255,0.5);cursor:pointer">⬇ Exportar</div>
</div>
</body>
</html>
