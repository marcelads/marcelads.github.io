<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Template Gallery</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400&display=swap');

  :root {
    --bg: #080c14;
    --surface: #0f1520;
    --surface2: #161e2e;
    --border: rgba(255,255,255,0.07);
    --text: rgba(255,255,255,0.9);
    --muted: rgba(255,255,255,0.35);
    --accent: #fa5f28;
    --teal: #2b9d94;
    --glow: rgba(250,95,40,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-dot {
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 8px var(--accent); }
    50% { box-shadow: 0 0 20px var(--accent), 0 0 40px var(--glow); }
  }
  .brand-name { font-size: 15px; font-weight: 700; letter-spacing: 1px; }
  .brand-sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 2px; margin-top: 1px; }

  .counter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }
  .counter span { color: var(--accent); font-weight: 600; }

  /* ── MAIN ── */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 280px 1fr;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  aside {
    border-right: 1px solid var(--border);
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow-y: auto;
  }

  .aside-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .tmpl-item {
    padding: 12px 14px;
    border-radius: 10px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s ease;
  }
  .tmpl-item:hover { background: var(--surface); border-color: var(--border); }
  .tmpl-item.active {
    background: var(--surface2);
    border-color: rgba(250,95,40,0.3);
    box-shadow: 0 0 20px rgba(250,95,40,0.05);
  }
  .tmpl-name { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
  .tmpl-cat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .tmpl-item.active .tmpl-cat { color: var(--accent); }

  /* ADICIONAR NOVO — slot vazio */
  .tmpl-add {
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px dashed rgba(255,255,255,0.1);
    cursor: pointer;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 1px;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .tmpl-add:hover { border-color: var(--accent); color: var(--accent); }

  /* ── PREVIEW AREA ── */
  .preview-area {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* INFO BAR */
  .info-bar {
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .info-left { display: flex; flex-direction: column; gap: 4px; }
  .info-title { font-size: 18px; font-weight: 800; }
  .info-desc { font-size: 12px; color: var(--muted); }

  .tags { display: flex; gap: 6px; margin-top: 4px; }
  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    padding: 3px 8px;
    border-radius: 4px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--muted);
    letter-spacing: 1px;
  }

  .actions { display: flex; gap: 10px; align-items: center; }

  .btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 9px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.2s ease;
    letter-spacing: 0.3px;
  }
  .btn-html {
    background: var(--accent);
    color: #fff;
  }
  .btn-html:hover { background: #ff7040; box-shadow: 0 0 20px rgba(250,95,40,0.4); }

  .btn-prompt {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-prompt:hover { border-color: var(--teal); color: var(--teal); }

  .btn-dl {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-dl:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
    z-index: 999;
  }
  #toast.show { transform: translateY(0); opacity: 1; }

  /* IFRAME */
  .iframe-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    margin: 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
  }

  .iframe-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* NAV ARROWS */
  .nav-arrows {
    position: absolute;
    bottom: 16px;
    right: 16px;
    display: flex;
    gap: 6px;
    z-index: 10;
  }

  .arrow-btn {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: rgba(15,21,32,0.8);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
    transition: all 0.2s;
  }
  .arrow-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* SCROLLBAR */
  aside::-webkit-scrollbar { width: 4px; }
  aside::-webkit-scrollbar-track { background: transparent; }
  aside::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-dot"></div>
    <div>
      <div class="brand-name">TEMPLATE GALLERY</div>
      <div class="brand-sub">HTML · CSS · JS — PORTÁTIL</div>
    </div>
  </div>
  <div class="counter">
    TEMPLATE <span id="cur">01</span> / <span id="tot">03</span>
  </div>
</header>

<main>
  <aside>
    <div class="aside-label">Templates</div>
    <div id="tmpl-list"></div>

    <!-- ── SLOT PARA ADICIONAR NOVOS ── -->
    <div class="tmpl-add" onclick="alert('Adicione seu template em templates.js')">
      + Adicionar template
    </div>
  </aside>

  <div class="preview-area">
    <div class="info-bar">
      <div class="info-left">
        <div class="info-title" id="info-nome"></div>
        <div class="info-desc" id="info-desc"></div>
        <div class="tags" id="info-tags"></div>
      </div>
      <div class="actions">
        <button class="btn btn-dl" id="btn-dl">⬇ .html</button>
        <button class="btn btn-prompt" id="btn-prompt">◈ Copiar Prompt MD</button>
        <button class="btn btn-html" id="btn-html">⧉ Copiar HTML</button>
      </div>
    </div>

    <div class="iframe-wrap">
      <iframe id="preview" sandbox="allow-scripts allow-same-origin"></iframe>
      <div class="nav-arrows">
        <button class="arrow-btn" id="prev-btn">←</button>
        <button class="arrow-btn" id="next-btn">→</button>
      </div>
    </div>
  </div>
</main>

<div id="toast"></div>

<script src="templates.js"></script>
<script>
  let current = 0;

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function pad(n) { return String(n+1).padStart(2,'0'); }

  function loadTemplate(idx) {
    current = ((idx % templates.length) + templates.length) % templates.length;
    const t = templates[current];

    // sidebar highlight
    document.querySelectorAll('.tmpl-item').forEach((el, i) => {
      el.classList.toggle('active', i === current);
    });

    // info bar
    document.getElementById('info-nome').textContent = t.nome;
    document.getElementById('info-desc').textContent = t.descricao;
    document.getElementById('cur').textContent = pad(current);

    const tagsEl = document.getElementById('info-tags');
    tagsEl.innerHTML = t.tags.map(tag => `<span class="tag">${tag}</span>`).join('');

    // iframe
    document.getElementById('preview').src = t.arquivo;
  }

  function buildSidebar() {
    const list = document.getElementById('tmpl-list');
    list.innerHTML = '';
    document.getElementById('tot').textContent = pad(templates.length - 1);

    templates.forEach((t, i) => {
      const el = document.createElement('div');
      el.className = 'tmpl-item';
      el.innerHTML = `<div class="tmpl-name">${t.nome}</div><div class="tmpl-cat">${t.categoria}</div>`;
      el.onclick = () => loadTemplate(i);
      list.appendChild(el);
    });
  }

  // ── COPIAR HTML ──
  document.getElementById('btn-html').onclick = async () => {
    const t = templates[current];
    try {
      const res = await fetch(t.arquivo);
      const html = await res.text();
      await navigator.clipboard.writeText(html);
      toast('✓ HTML copiado');
    } catch(e) {
      toast('⚠ Erro ao copiar (rode num servidor)');
    }
  };

  // ── COPIAR PROMPT MD ──
  document.getElementById('btn-prompt').onclick = async () => {
    const t = templates[current];
    try {
      await navigator.clipboard.writeText(t.prompt);
      toast('✓ Prompt copiado');
    } catch(e) {
      toast('⚠ Erro ao copiar');
    }
  };

  // ── DOWNLOAD HTML ──
  document.getElementById('btn-dl').onclick = async () => {
    const t = templates[current];
    try {
      const res = await fetch(t.arquivo);
      const html = await res.text();
      const blob = new Blob([html], {type: 'text/html'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = t.arquivo.split('/').pop();
      a.click();
      toast('✓ Download iniciado');
    } catch(e) {
      toast('⚠ Rode num servidor HTTP');
    }
  };

  // ── NAVEGAÇÃO ──
  document.getElementById('prev-btn').onclick = () => loadTemplate(current - 1);
  document.getElementById('next-btn').onclick = () => loadTemplate(current + 1);

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') loadTemplate(current - 1);
    if (e.key === 'ArrowRight') loadTemplate(current + 1);
  });

  // ── INIT ──
  buildSidebar();
  loadTemplate(0);
</script>
</body>
</html>
