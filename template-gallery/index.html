<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Template Gallery — Marcela DS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400&display=swap');

  :root {
    --bg:       #080c14;
    --surface:  #0f1520;
    --surface2: #161e2e;
    --border:   rgba(255,255,255,0.07);
    --text:     rgba(255,255,255,0.9);
    --muted:    rgba(255,255,255,0.35);

    /* ── Cor de destaque — controlada por templates.js ── */
    --accent:     #42B9BE;
    --glow:       rgba(66,185,190,0.15);
    --accent-rgb: 66,185,190;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .brand { display:flex; align-items:center; gap:12px; }

  .brand-dot {
    width:9px; height:9px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 8px var(--accent); }
    50%      { box-shadow: 0 0 20px var(--accent), 0 0 40px var(--glow); }
  }

  .brand-name {
    font-size:15px; font-weight:700; letter-spacing:1px;
    position:relative; display:inline-block;
  }
  /* Glitch — igual ao portfolio da Marcela */
  .brand-name::before,
  .brand-name::after {
    content: attr(data-text);
    position:absolute; inset:0;
    pointer-events:none; opacity:0;
  }
  .brand-name::before { animation: glitch-a 2s steps(2,end) 0.5s infinite; }
  .brand-name::after  { animation: glitch-b 2s steps(2,end) 0.5s infinite; }
  @keyframes glitch-a {
    0%,85%,100% { opacity:0; transform:none; }
    86% { opacity:1; clip-path:polygon(0 18%,100% 18%,100% 32%,0 32%); transform:translate(-5px,0); color:#42B9BE; }
    88% { opacity:1; clip-path:polygon(0 62%,100% 62%,100% 76%,0 76%); transform:translate(4px,0);  color:#42B9BE; }
    90% { opacity:1; clip-path:polygon(0 8%, 100% 8%, 100% 14%,0 14%); transform:translate(-3px,0); color:#42B9BE; }
    93% { opacity:1; clip-path:polygon(0 42%,100% 42%,100% 52%,0 52%); transform:translate(3px,0);  color:#42B9BE; }
    96% { opacity:1; clip-path:polygon(0 84%,100% 84%,100% 94%,0 94%); transform:translate(-2px,0); color:#42B9BE; }
    99% { opacity:0; transform:none; }
  }
  @keyframes glitch-b {
    0%,85%,100% { opacity:0; transform:none; }
    86% { opacity:1; clip-path:polygon(0 60%,100% 60%,100% 72%,0 72%); transform:translate(5px,0);  color:#E5007E; }
    88% { opacity:1; clip-path:polygon(0 22%,100% 22%,100% 34%,0 34%); transform:translate(-4px,0); color:#E5007E; }
    90% { opacity:1; clip-path:polygon(0 78%,100% 78%,100% 88%,0 88%); transform:translate(3px,0);  color:#E5007E; }
    93% { opacity:1; clip-path:polygon(0 12%,100% 12%,100% 22%,0 22%); transform:translate(-3px,0); color:#E5007E; }
    96% { opacity:1; clip-path:polygon(0 46%,100% 46%,100% 56%,0 56%); transform:translate(2px,0);  color:#E5007E; }
    99% { opacity:0; transform:none; }
  }
  .brand-sub  {
    font-family:'JetBrains Mono',monospace;
    font-size:10px; color:var(--muted);
    letter-spacing:2px; margin-top:1px;
  }

  .header-right { display:flex; align-items:center; gap:20px; }

  /* link site principal */
  .site-link {
    font-family:'JetBrains Mono',monospace;
    font-size:10px; color:var(--muted);
    letter-spacing:1px;
    text-decoration:none;
    border-bottom: 1px solid transparent;
    transition: color .2s, border-color .2s;
  }
  .site-link:hover { color:var(--accent); border-color:var(--accent); }

  .counter {
    font-family:'JetBrains Mono',monospace;
    font-size:11px; color:var(--muted); letter-spacing:1px;
  }
  .counter span { color:var(--accent); font-weight:600; }

  /* ── MAIN ── */
  main {
    flex:1;
    display:grid;
    grid-template-columns: 260px 1fr;
    overflow:hidden;
  }

  /* ── SIDEBAR ── */
  aside {
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    display:flex; flex-direction:column; gap:6px;
    overflow-y:auto;
  }

  .aside-label {
    font-family:'JetBrains Mono',monospace;
    font-size:9px; letter-spacing:3px; color:var(--muted);
    text-transform:uppercase; margin-bottom:6px;
    padding-bottom:8px; border-bottom:1px solid var(--border);
  }

  .tmpl-item {
    padding:11px 13px; border-radius:9px;
    cursor:pointer; border:1px solid transparent;
    transition:all .2s ease;
  }
  .tmpl-item:hover { background:var(--surface); border-color:var(--border); }
  .tmpl-item.active {
    background:var(--surface2);
    border-color: rgba(var(--accent-rgb),0.3);
    box-shadow: 0 0 20px rgba(var(--accent-rgb),0.05);
  }
  .tmpl-name { font-size:12px; font-weight:600; margin-bottom:3px; }
  .tmpl-cat  {
    font-family:'JetBrains Mono',monospace;
    font-size:9px; letter-spacing:1px; color:var(--muted);
    text-transform:uppercase;
  }
  .tmpl-item.active .tmpl-cat { color:var(--accent); }

  /* ── PREVIEW AREA ── */
  .preview-area { display:flex; flex-direction:column; overflow:hidden; }

  /* INFO BAR */
  .info-bar {
    padding:14px 24px;
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
    flex-shrink:0;
  }

  .info-left { display:flex; flex-direction:column; gap:3px; }
  .info-title { font-size:17px; font-weight:800; }
  .info-desc  { font-size:11px; color:var(--muted); }

  .tags { display:flex; gap:5px; margin-top:4px; }
  .tag  {
    font-family:'JetBrains Mono',monospace;
    font-size:9px; padding:2px 7px; border-radius:4px;
    background:rgba(255,255,255,0.04);
    border:1px solid var(--border); color:var(--muted);
    letter-spacing:1px;
  }

  .actions { display:flex; gap:8px; align-items:center; }

  .btn {
    display:flex; align-items:center; gap:5px;
    padding:8px 14px; border-radius:7px; border:none;
    cursor:pointer; font-family:'Syne',sans-serif;
    font-size:11px; font-weight:600;
    transition:all .2s ease; letter-spacing:0.3px;
  }

  /* botão principal — usa a cor de destaque */
  .btn-html {
    background: var(--accent);
    color: #fff;
  }
  .btn-html:hover {
    filter: brightness(1.15);
    box-shadow: 0 0 20px var(--glow);
  }

  .btn-prompt {
    background:var(--surface2); color:var(--text);
    border:1px solid var(--border);
  }
  .btn-prompt:hover { border-color:var(--accent); color:var(--accent); }

  .btn-dl {
    background:transparent; color:var(--muted);
    border:1px solid var(--border);
  }
  .btn-dl:hover { color:var(--text); border-color:rgba(255,255,255,0.2); }

  /* botão DAX */
  .btn-dax {
    background:transparent; color:var(--muted);
    border:1px solid var(--border);
  }
  .btn-dax:hover { border-color:var(--accent); color:var(--accent); }

  /* TOAST */
  #toast {
    position:fixed; bottom:24px; right:24px;
    background:var(--surface2);
    border:1px solid var(--border);
    border-left:3px solid var(--accent);
    padding:11px 18px; border-radius:7px;
    font-size:11px; font-family:'JetBrains Mono',monospace;
    letter-spacing:1px;
    transform:translateY(80px); opacity:0;
    transition:all .3s cubic-bezier(0.16,1,0.3,1);
    z-index:999;
  }
  #toast.show { transform:translateY(0); opacity:1; }

  /* IFRAME */
  .iframe-wrap {
    flex:1; position:relative; overflow:hidden;
    margin:14px; border-radius:11px;
    border:1px solid var(--border);
    background:var(--surface);
  }
  .iframe-wrap iframe { width:100%; height:100%; border:none; display:block; }

  /* NAV ARROWS */
  .nav-arrows {
    position:absolute; bottom:14px; right:14px;
    display:flex; gap:6px; z-index:10;
  }
  .arrow-btn {
    width:34px; height:34px; border-radius:7px;
    background:rgba(15,21,32,0.85);
    border:1px solid var(--border); color:var(--text);
    cursor:pointer; font-size:13px;
    display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(8px); transition:all .2s;
  }
  .arrow-btn:hover { border-color:var(--accent); color:var(--accent); }

  aside::-webkit-scrollbar { width:3px; }
  aside::-webkit-scrollbar-track { background:transparent; }
  aside::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:2px; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-dot"></div>
    <div>
      <div class="brand-name" data-text="TEMPLATE GALLERY">TEMPLATE GALLERY</div>
      <div class="brand-sub">HTML · CSS · JS — PORTÁTIL</div>
    </div>
  </div>
  <div class="header-right">
    <a class="site-link" href="https://marcelads.github.io" target="_blank">↗ marcelads.github.io</a>
    <div class="counter">
      <span id="cur">01</span> / <span id="tot">04</span>
    </div>
  </div>
</header>

<main>
  <aside>
    <div class="aside-label">Templates</div>
    <div id="tmpl-list"></div>
    <!-- Botão "Adicionar" removido intencionalmente -->
    <!-- Para adicionar templates, edite templates.js -->
  </aside>

  <div class="preview-area">
    <div class="info-bar">
      <div class="info-left">
        <div class="info-title" id="info-nome"></div>
        <div class="info-desc"  id="info-desc"></div>
        <div class="tags"       id="info-tags"></div>
      </div>
      <div class="actions">
        <button class="btn btn-dl"     id="btn-dl">⬇ .html</button>
        <button class="btn btn-dax"    id="btn-dax">⬇ DAX</button>
        <button class="btn btn-prompt" id="btn-prompt">◈ Prompt MD</button>
        <button class="btn btn-html"   id="btn-html">⧉ Copiar HTML</button>
      </div>
    </div>

    <div class="iframe-wrap">
      <iframe id="preview" sandbox="allow-scripts allow-same-origin"></iframe>
      <div class="nav-arrows">
        <button class="arrow-btn" id="prev-btn">←</button>
        <button class="arrow-btn" id="next-btn">→</button>
      </div>
    </div>
  </div>
</main>

<div id="toast"></div>

<script src="templates.js"></script>
<script>
  let current = 0;

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function pad(n) { return String(n + 1).padStart(2,'0'); }

  function loadTemplate(idx) {
    current = ((idx % templates.length) + templates.length) % templates.length;
    const t = templates[current];

    document.querySelectorAll('.tmpl-item').forEach((el, i) => {
      el.classList.toggle('active', i === current);
    });

    document.getElementById('info-nome').textContent = t.nome;
    document.getElementById('info-desc').textContent = t.descricao;
    document.getElementById('cur').textContent = pad(current);

    const tagsEl = document.getElementById('info-tags');
    tagsEl.innerHTML = t.tags.map(tag => `<span class="tag">${tag}</span>`).join('');

    document.getElementById('preview').src = t.arquivo;
  }

  function buildSidebar() {
    const list = document.getElementById('tmpl-list');
    list.innerHTML = '';
    document.getElementById('tot').textContent = pad(templates.length - 1);

    templates.forEach((t, i) => {
      const el = document.createElement('div');
      el.className = 'tmpl-item';
      el.innerHTML = `<div class="tmpl-name">${t.nome}</div><div class="tmpl-cat">${t.categoria}</div>`;
      el.onclick = () => loadTemplate(i);
      list.appendChild(el);
    });
  }

  // ── COPIAR HTML ──
  document.getElementById('btn-html').onclick = async () => {
    const t = templates[current];
    try {
      const res = await fetch(t.arquivo);
      const html = await res.text();
      await navigator.clipboard.writeText(html);
      toast('✓ HTML copiado');
    } catch(e) { toast('⚠ Rode num servidor HTTP'); }
  };

  // ── COPIAR PROMPT MD ──
  // Se o template tiver campo 'md', busca o arquivo .md da pasta
  // Senão, cai no campo 'prompt' inline do templates.js
  document.getElementById('btn-prompt').onclick = async () => {
    const t = templates[current];
    try {
      if (t.md) {
        const res = await fetch(t.md);
        const txt = await res.text();
        await navigator.clipboard.writeText(txt);
      } else {
        await navigator.clipboard.writeText(t.prompt);
      }
      toast('✓ Prompt MD copiado');
    } catch(e) { toast('⚠ Erro ao copiar'); }
  };

  // ── DOWNLOAD HTML ──
  document.getElementById('btn-dl').onclick = async () => {
    const t = templates[current];
    try {
      const res  = await fetch(t.arquivo);
      const html = await res.text();
      const blob = new Blob([html], {type:'text/html'});
      const a    = document.createElement('a');
      a.href     = URL.createObjectURL(blob);
      a.download = t.arquivo;
      a.click();
      toast('✓ Download iniciado');
    } catch(e) { toast('⚠ Rode num servidor HTTP'); }
  };

  // ── DOWNLOAD DAX ──
  // Converte o HTML pra string compatível com DAX/HTML Content Visual do Power BI
  // Escapa aspas duplas e quebra em linha única
  document.getElementById('btn-dax').onclick = async () => {
    const t = templates[current];
    try {
      const res  = await fetch(t.arquivo);
      const html = await res.text();

      // Adaptação pra DAX:
      // 1. Remove quebras de linha
      // 2. Escapa aspas duplas → &quot;
      // 3. Envolve em expressão DAX pronta pra colar
      const clean = html
        .replace(/\r?\n/g, ' ')          // remove newlines
        .replace(/\s{2,}/g, ' ')         // colapsa espaços duplos
        .replace(/"/g, '&quot;');        // escapa aspas

      const dax = `"${clean}"`;

      await navigator.clipboard.writeText(dax);
      toast('✓ DAX copiado — cole no HTML Content Visual');
    } catch(e) { toast('⚠ Rode num servidor HTTP'); }
  };

  // ── NAVEGAÇÃO ──
  document.getElementById('prev-btn').onclick = () => loadTemplate(current - 1);
  document.getElementById('next-btn').onclick = () => loadTemplate(current + 1);

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  loadTemplate(current - 1);
    if (e.key === 'ArrowRight') loadTemplate(current + 1);
  });

  // ── INIT ──
  buildSidebar();
  loadTemplate(0);
</script>
</body>
</html>
