<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #fff;
    font-family: 'Bebas Neue', 'Anton', 'Impact', sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .particles { position: absolute; inset: 0; pointer-events: none; }
  .particle {
    position: absolute;
    width: 2px; height: 2px;
    background: #c9a227;
    border-radius: 50%;
    animation: float linear infinite;
    opacity: 0;
  }
  @keyframes float {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
  }
  .hero {
    text-align: center;
    animation: reveal 1.2s cubic-bezier(0.16,1,0.3,1) forwards;
    opacity: 0;
  }
  @keyframes reveal {
    0% { opacity: 0; transform: scale(0.85) translateY(30px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  .badge {
    font-family: monospace;
    font-size: 11px;
    letter-spacing: 6px;
    color: #c9a227;
    margin-bottom: 20px;
    text-transform: uppercase;
  }
  h1 {
    font-size: clamp(60px, 12vw, 140px);
    letter-spacing: 10px;
    line-height: 0.9;
    text-transform: uppercase;
    background: linear-gradient(180deg, #fff 40%, #c9a227 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 20px;
  }
  .line { width: 80px; height: 2px; background: #c9a227; margin: 20px auto; }
  .sub {
    font-size: 13px;
    letter-spacing: 8px;
    color: rgba(255,255,255,0.4);
    font-family: monospace;
  }
  .glow {
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(201,162,39,0.08) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="glow"></div>
<div class="particles" id="particles"></div>
<div class="hero">
  <div class="badge">⬡ UEFA Champions League ⬡</div>
  <h1>CHAMPIONS<br>LEAGUE</h1>
  <div class="line"></div>
  <div class="sub">GLORY · HONOR · LEGACY</div>
</div>
<script>
  const p = document.getElementById('particles');
  for (let i = 0; i < 40; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.animationDuration = (4 + Math.random() * 8) + 's';
    el.style.animationDelay = (Math.random() * 6) + 's';
    el.style.width = el.style.height = (1 + Math.random() * 3) + 'px';
    p.appendChild(el);
  }
</script>
</body>
</html>
