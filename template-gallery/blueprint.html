<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Precision Data Architecture</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{width:100%;height:100vh;overflow:hidden;font-family:Inter,sans-serif;background:#0c1420;position:relative;}
  canvas#n1{position:absolute;inset:0;width:100%;height:100%;}
  .content{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;}
  .badge{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(56,189,248,0.25);border-radius:4px;padding:6px 16px;margin-bottom:20px;opacity:0;animation:bpfade .7s 1s forwards;}
  .badge-dot{width:6px;height:6px;border-radius:50%;background:#38bdf8;animation:bpblink 1.5s infinite;flex-shrink:0;}
  .badge-text{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(56,189,248,0.7);}
  .headline{font-size:clamp(32px,5vw,56px);font-weight:300;color:#fff;margin-bottom:8px;letter-spacing:-1px;line-height:1.1;opacity:0;animation:bpfade .7s 1.3s forwards;}
  .headline strong{font-weight:700;color:#38bdf8;}
  .divider{width:0;height:1px;background:linear-gradient(90deg,transparent,rgba(56,189,248,0.4),transparent);margin:20px auto;animation:bpexp .8s 1.8s forwards;}
  .subtitle{font-size:14px;color:rgba(255,255,255,0.35);max-width:500px;line-height:1.9;opacity:0;animation:bpfade .7s 2s forwards;}
  .stats{display:flex;gap:12px;margin-top:2rem;flex-wrap:wrap;justify-content:center;opacity:0;animation:bpfade .7s 2.4s forwards;}
  .stat-card{border:1px solid rgba(56,189,248,0.12);border-radius:6px;padding:12px 20px;background:rgba(56,189,248,0.04);min-width:110px;transition:border-color .2s,background .2s;}
  .stat-card:hover{border-color:rgba(56,189,248,0.3);background:rgba(56,189,248,0.08);}
  .stat-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(56,189,248,0.5);margin-bottom:6px;}
  .stat-value{font-size:20px;font-weight:600;color:#fff;}
  @keyframes bpfade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes bpexp{to{width:200px}}
  @keyframes bpblink{0%,100%{opacity:1}50%{opacity:.2}}
</style>
</head>
<body>
<canvas id="n1"></canvas>
<div class="content">
  <div class="badge"><div class="badge-dot"></div><span class="badge-text">Enterprise Analytics Platform</span></div>
  <div class="headline">Precision <strong>Data</strong><br>Architecture</div>
  <div class="divider"></div>
  <div class="subtitle">End-to-end visibility across your entire data infrastructure. From ingestion to insight — every metric accounted for.</div>
  <div class="stats">
    <div class="stat-card"><div class="stat-label">Pipelines</div><div class="stat-value">247</div></div>
    <div class="stat-card"><div class="stat-label">Sources</div><div class="stat-value">89</div></div>
    <div class="stat-card"><div class="stat-label">Latency</div><div class="stat-value">&lt;2s</div></div>
    <div class="stat-card"><div class="stat-label">SLA</div><div class="stat-value">99.97%</div></div>
  </div>
</div>
<script>
var nc=document.getElementById('n1'),nx=nc.getContext('2d'),nw,nh,nd=[];
function ni(){nw=nc.width=window.innerWidth;nh=nc.height=window.innerHeight;nd=Array.from({length:18},function(){return{x:Math.random()*nw,y:Math.random()*nh,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,r:Math.random()*2+1};});}
function ndr(){
  nx.clearRect(0,0,nw,nh);
  nd.forEach(function(n){n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>nw)n.vx*=-1;if(n.y<0||n.y>nh)n.vy*=-1;});
  nd.forEach(function(a,i){nd.forEach(function(b,j){if(j<=i)return;var d=Math.hypot(a.x-b.x,a.y-b.y);if(d<180){nx.strokeStyle='rgba(56,189,248,'+(0.12*(1-d/180))+')';nx.lineWidth=.5;nx.beginPath();nx.moveTo(a.x,a.y);nx.lineTo(b.x,b.y);nx.stroke();}});});
  nd.forEach(function(n){nx.beginPath();nx.arc(n.x,n.y,n.r,0,Math.PI*2);nx.fillStyle='rgba(56,189,248,0.4)';nx.fill();});
  requestAnimationFrame(ndr);
}
ni();ndr();window.addEventListener('resize',ni);
</script>
</body>
</html>
