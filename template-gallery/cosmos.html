<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Ventas</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{width:100%;height:100vh;overflow:hidden;font-family:Inter,sans-serif;background:#000008;position:relative;}
  canvas#s1{position:absolute;inset:0;width:100%;height:100%;}
  .ring{position:absolute;border-radius:50%;left:50%;top:50%;}
  .ring-sm{width:300px;height:300px;border:1px solid rgba(0,170,255,0.08);animation:spin1 18s linear infinite;}
  .ring-md{width:500px;height:500px;border:1px solid rgba(0,170,255,0.05);animation:spin1 30s linear infinite;}
  .ring-lg{width:700px;height:700px;border:1px solid rgba(0,170,255,0.03);animation:spin1 50s linear infinite;}
  .content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;text-align:center;padding:2rem;}
  .eyebrow{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:#00aaff;opacity:0;animation:fadeup 1s 1s forwards;}
  .headline{font-size:clamp(36px,5vw,56px);font-weight:700;color:#fff;margin:12px 0 8px;opacity:0;animation:fadeup 1s 1.3s forwards;text-shadow:0 0 40px rgba(0,170,255,0.4);line-height:1.1;}
  .subtitle{font-size:18px;color:rgba(255,255,255,0.5);opacity:0;animation:fadeup 1s 1.6s forwards;max-width:500px;line-height:1.7;}
  .cta{margin-top:2rem;padding:12px 32px;border:1px solid #00aaff;color:#00aaff;font-size:13px;letter-spacing:2px;text-transform:uppercase;border-radius:4px;opacity:0;animation:fadeup 1s 2s forwards;cursor:pointer;background:transparent;transition:background .2s,color .2s,box-shadow .2s;font-family:inherit;}
  .cta:hover{background:rgba(0,170,255,0.1);box-shadow:0 0 20px rgba(0,170,255,0.25);}
  @keyframes fadeup{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin1{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}
</style>
</head>
<body>
<canvas id="s1"></canvas>
<div class="ring ring-sm"></div>
<div class="ring ring-md"></div>
<div class="ring ring-lg"></div>
<div class="content">
  <div class="eyebrow">Power BI · Inteligencia de Datos</div>
  <div class="headline">Dashboard<br>de Ventas</div>
  <div class="subtitle">Resumen de ventas histórico.<br>Descubre las tendencias y patrones que impulsan tu negocio a través del tiempo.</div>
  <button class="cta">Iniciar Dashboard</button>
</div>
<script>
var c=document.getElementById('s1'),x=c.getContext('2d'),w,h,st=[];
function ri(){
  w=c.width=window.innerWidth;h=c.height=window.innerHeight;
  st=Array.from({length:200},function(){return{x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.2+.2,a:Math.random(),sp:Math.random()*.3+.05,tw:Math.random()*Math.PI*2};});
}
function dr(){
  x.clearRect(0,0,w,h);
  st.forEach(function(s){s.tw+=.02;s.a=.3+Math.sin(s.tw)*.3;x.beginPath();x.arc(s.x,s.y,s.r,0,Math.PI*2);x.fillStyle='rgba(200,220,255,'+s.a+')';x.fill();s.y-=s.sp;if(s.y<0){s.y=h;s.x=Math.random()*w;}});
  requestAnimationFrame(dr);
}
ri();dr();window.addEventListener('resize',ri);
</script>
</body>
</html>
